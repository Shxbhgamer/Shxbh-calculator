<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Scientific Calculator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="calculator">

    <div class="top-bar">
        <button onclick="toggleMode()">🌙</button>
        <button onclick="toggleAngle()" id="angleBtn">DEG</button>
        <button onclick="toggleTrig()">Trig</button>
    </div>

    <div class="display" id="display">0</div>

    <div class="trig-section hidden" id="trigSection">
        <button onclick="applyFunc('sin')">sin</button>
        <button onclick="applyFunc('cos')">cos</button>
        <button onclick="applyFunc('tan')">tan</button>
        <button onclick="applyFunc('sqrt')">√</button>

        <button onclick="applyFunc('log')">log</button>
        <button onclick="applyFunc('ln')">ln</button>
        <button onclick="append('Math.PI')">π</button>
        <button onclick="append('Math.E')">e</button>

        <button onclick="append('(')">(</button>
        <button onclick="append(')')">)</button>
        <button onclick="append('**')">xʸ</button>
        <button onclick="append('**2')">x²</button>
    </div>

    <div class="buttons">

        <button onclick="clearDisplay()">C</button>
        <button onclick="append('/')">÷</button>
        <button onclick="append('*')">×</button>
        <button onclick="append('-')">−</button>

        <button onclick="append('7')">7</button>
        <button onclick="append('8')">8</button>
        <button onclick="append('9')">9</button>
        <button onclick="append('+')">+</button>

        <button onclick="append('4')">4</button>
        <button onclick="append('5')">5</button>
        <button onclick="append('6')">6</button>
        <button onclick="calculate()" class="equal">=</button>

        <button onclick="append('1')">1</button>
        <button onclick="append('2')">2</button>
        <button onclick="append('3')">3</button>
        <button onclick="append('.')">.</button>

        <button class="delete" onclick="backspace()">⌫</button>
        <button onclick="append('0')" class="zero">0</button>
        <button onclick="clearHistory()">🗑</button>

    </div>

    <div class="history-container">
        <div class="history" id="history"></div>
    </div>

</div>

<script>
let display = document.getElementById("display");
let historyBox = document.getElementById("history");
let angleMode = "DEG";

function append(val){
    if(display.innerText === "0") display.innerText = val;
    else display.innerText += val;
}

function clearDisplay(){ display.innerText="0"; }

function backspace(){
    if(display.innerText.length>1)
        display.innerText=display.innerText.slice(0,-1);
    else display.innerText="0";
}

function clearHistory(){ historyBox.innerHTML=""; }

function toggleMode(){ document.body.classList.toggle("light"); }

function toggleAngle(){
    angleMode = angleMode==="DEG"?"RAD":"DEG";
    document.getElementById("angleBtn").innerText=angleMode;
}

function toggleTrig(){
    document.getElementById("trigSection").classList.toggle("hidden");
}

function applyFunc(func){
    try{
        let value=eval(display.innerText);
        if(angleMode==="DEG" && ["sin","cos","tan"].includes(func))
            value=value*(Math.PI/180);

        let result={
            sin:Math.sin(value),
            cos:Math.cos(value),
            tan:Math.tan(value),
            sqrt:Math.sqrt(value),
            log:Math.log10(value),
            ln:Math.log(value)
        }[func];

        historyBox.innerHTML+=display.innerText+" → "+func+" = "+result+"<br>";
        display.innerText=result;
    }catch{ display.innerText="Error"; }
}

function calculate(){
    try{
        let result=eval(display.innerText);
        historyBox.innerHTML+=display.innerText+" = "+result+"<br>";
        display.innerText=result;
    }catch{ display.innerText="Error"; }
}

document.addEventListener("keydown",e=>{
    if(!isNaN(e.key)||"+-*/().".includes(e.key)) append(e.key);
    if(e.key==="Enter") calculate();
    if(e.key==="Backspace") backspace();
});
</script>

</body>
</html>
